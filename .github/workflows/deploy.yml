name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # only deploy on push to main, not PRs

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: islamqaacr.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: islamqaacr.azurecr.io/islam-qa-search:${{ github.sha }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: islam-qa-rg
          containerAppName: islam-qa-search
          containerAppEnvironment: islam-qa-env
          imageToDeploy: islamqaacr.azurecr.io/islam-qa-search:${{ github.sha }}
          targetPort: 8000
          ingress: external
          environmentVariables: >
            EMBEDDER_PROVIDER=cohere
            VECTOR_STORE_PROVIDER=qdrant
            RERANKER_PROVIDER=cohere
            RERANK_MODEL=rerank-multilingual-v3.0
            LLM_PROVIDER=groq
            LLM_MODEL_NAME=llama-3.3-70b-versatile
            RETRIEVAL_TOP_K=20
            RETRIEVAL_TOP_N=5
            QDRANT_COLLECTION_NAME=islam_qa_v2
            QDRANT_VECTOR_SIZE=1024
            EMBEDDING_MODEL_NAME=embed-multilingual-v3.0
            LOG_LEVEL=INFO
            LOG_FILE=logs/app.log
            API_KEY=secretref:api-key
            QDRANT_URL=secretref:qdrant-url
            QDRANT_API_KEY=secretref:qdrant-api-key
            COHERE_API_KEY=secretref:cohere-api-key
            GROQ_API_KEY=secretref:groq-api-key
            GEMINI_API_KEY=secretref:gemini-api-key